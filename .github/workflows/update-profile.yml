name: Update profile dashboard

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: profile-dashboard
  cancel-in-progress: false

jobs:
  update:
    if: github.repository == 'MrMajumder/MrMajumder'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Check out profile repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Restore private aggregate cache
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .cache/profile_stats.json
          key: profile-stats-v1-${{ github.run_id }}
          restore-keys: |
            profile-stats-v1-

      - name: Install pinned dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      # This secret is read-only and is never used for the commit or printed.
      - name: Generate dashboard
        env:
          PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
          PROFILE_STATS_CACHE: .cache/profile_stats.json
        run: python scripts/generate_readme.py --require-private-token

      - name: Commit updated dashboard
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain -- README.md assets/profile-light.svg assets/profile-dark.svg)" ]]; then
            echo "Dashboard is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/profile-light.svg assets/profile-dark.svg
          git commit -m "chore: update profile dashboard"
          git push
